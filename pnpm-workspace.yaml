# pnpm 10+ reads these settings here (the package.json `pnpm` field is ignored).

# Transitive-dependency security pins.
overrides:
  "fast-xml-parser@>=5.0.0 <5.3.5": ">=5.3.5"
  "shell-quote@<1.8.4": ">=1.8.4"
  # Dev/transitive (vitest, wrangler→miniflare) — not shipped to the Worker.
  # Pin what resolves cleanly; CI blocks on the runtime audit and keeps the full
  # dev-tool audit advisory.
  "vite@>=7.0.0 <7.3.5": ">=7.3.5"
  "ws@>=8.0.0 <8.21.0": ">=8.21.0"
  "undici@>=7.23.0 <7.28.0": ">=7.28.0"

# Don't auto-install/verify deps before every `pnpm run`. pnpm 11's default
# runs an internal install before scripts, which aborts in non-TTY contexts
# (husky hooks, CI) and broke pre-commit `pnpm lint`/`typecheck`. Scripts run
# against the installed node_modules; `pnpm install` still manages deps.
verifyDepsBeforeRun: false

# Explicitly DECLINE these packages' postinstall build scripts: they all ship
# prebuilt platform binaries, so a source build is neither needed nor wanted
# (sharp's, in particular, fails from source). Deciding them here also stops
# pnpm re-writing an "allowBuilds" approval stub on every install.
allowBuilds:
  esbuild: false
  workerd: false
  sharp: false
  es5-ext: false
