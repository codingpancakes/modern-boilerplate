# Organization types and operations

type Organization {
	id: ID!
	name: String
	slug: String
	orgType: String
	visibility: String
	defaultTimezone: String
	countryCode: String
	branding: JSON
	metadata: JSON
	status: String
	createdAt: DateTime!
	updatedAt: DateTime!

	# Relations
	members: [OrganizationMembership!]!
}

type OrganizationMembership {
	id: ID!
	userId: ID!
	organizationId: ID!
	role: OrgRole!
	joinedAt: DateTime!

	# Relations
	user: User!
	organization: Organization!
}

enum OrgRole {
	OWNER
	ADMIN
	MANAGER
	MEMBER
	VIEWER
}

type OrganizationMembershipPage {
	items: [OrganizationMembership!]!
	nextCursor: String
	hasMore: Boolean!
}

# Queries
extend type Query {
	myOrganizations(limit: Int, cursor: String): OrganizationMembershipPage!
	organization(id: ID!): Organization
	organizationMembers(
		organizationId: ID!
		limit: Int
		cursor: String
	): OrganizationMembershipPage!
}

# Mutations
extend type Mutation {
	createOrganization(input: CreateOrganizationInput!): Organization!
	updateOrganization(id: ID!, input: UpdateOrganizationInput!): Organization!
	deleteOrganization(id: ID!): Boolean!
	inviteMember(
		organizationId: ID!
		input: InviteMemberInput!
	): OrganizationMembership!
	updateMemberRole(
		organizationId: ID!
		input: UpdateMemberRoleInput!
	): OrganizationMembership!
	removeMember(organizationId: ID!, memberId: ID!): Boolean!
	leaveOrganization(organizationId: ID!): Boolean!
}

# Input types
input CreateOrganizationInput {
	name: String!
	slug: String!
	orgType: String
	visibility: String
	defaultTimezone: String
	countryCode: String
	branding: JSON
	metadata: JSON
}

input UpdateOrganizationInput {
	name: String
	slug: String
	orgType: String
	visibility: String
	defaultTimezone: String
	countryCode: String
	branding: JSON
	metadata: JSON
}

input InviteMemberInput {
	userId: ID!
	role: OrgRole
}

input UpdateMemberRoleInput {
	memberId: ID!
	role: OrgRole!
}
