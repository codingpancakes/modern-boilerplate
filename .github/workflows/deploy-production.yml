name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: 
      name: production
      url: ${{ secrets.PRODUCTION_API_URL }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Build TypeScript
        run: pnpm run build

      - name: Run database migrations
        run: pnpm run migrate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - name: Deploy to AWS
        run: pnpm run deploy:production
        env:
          STAGE: production
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          WORKOS_CLIENT_ID: ${{ secrets.PRODUCTION_WORKOS_CLIENT_ID }}
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          IMAGES_BUCKET: ${{ secrets.PRODUCTION_IMAGES_BUCKET }}
          IMAGES_CDN_URL: ${{ secrets.PRODUCTION_IMAGES_CDN_URL }}
          CORS_DOMAIN_PATTERNS: ${{ secrets.PRODUCTION_CORS_DOMAIN_PATTERNS }}
          API_DOMAIN: ${{ secrets.PRODUCTION_API_DOMAIN }}
          HOSTED_ZONE_NAME: ${{ secrets.HOSTED_ZONE_NAME }}
          HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production

      - name: Run smoke tests
        run: pnpm run test:smoke
        env:
          API_URL: ${{ secrets.PRODUCTION_API_URL }}
          TEST_AUTH_TOKEN: ${{ secrets.PRODUCTION_TEST_AUTH_TOKEN }}

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        if: success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful!"
          echo "API URL: ${{ secrets.PRODUCTION_API_URL }}"
          echo "Commit: ${{ github.sha }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Production deployment failed!"
          exit 1
