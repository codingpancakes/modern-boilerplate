name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to deploy after the gate passes"
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: serverless_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit — runtime deps (BLOCKING)
        # Fails the build on any high+ vuln in deps that actually ship to the
        # Worker. This is the meaningful security gate.
        run: pnpm audit --prod --audit-level=high
      - name: Dependency audit — full incl. dev tooling (advisory)
        # vitest/wrangler transitive vulns (vite/ws/undici) don't reach runtime;
        # surfaced but non-blocking (some can't be overridden without breaking
        # the dev toolchain). Patched where possible via pnpm-workspace overrides.
        run: pnpm audit --audit-level=high || true
      - run: pnpm lint
      - run: pnpm typecheck
      - name: OpenAPI docs are current
        run: pnpm docs:check
      - run: pnpm test:run
      - name: Integration tests (real Postgres)
        run: pnpm test:integration
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5434/serverless_test

  deploy-staging:
    name: Deploy staging (gradual + auto-rollback)
    needs: gate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/staging') || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for Cloudflare token
        id: cf
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping deploy. Add it in repo Settings → Secrets to enable auto-deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy to staging
        if: steps.cf.outputs.ready == 'true'
        run: pnpm deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKERS_SUBDOMAIN: ${{ vars.WORKERS_SUBDOMAIN }}
          SMOKE_CORS_ORIGIN: ${{ vars.SMOKE_CORS_ORIGIN }}

  deploy-production:
    name: Deploy production (gradual + auto-rollback)
    needs: gate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for Cloudflare token
        id: cf
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN not set — cannot deploy to production."
            exit 1
          fi
      - name: Deploy to production
        run: pnpm deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKERS_SUBDOMAIN: ${{ vars.WORKERS_SUBDOMAIN }}
          SMOKE_CORS_ORIGIN: ${{ vars.SMOKE_CORS_ORIGIN }}
