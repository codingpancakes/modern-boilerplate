version: 0.2

# AWS CodeBuild buildspec for CI/CD
# This file defines the build process for your serverless backend

phases:
  install:
    runtime-versions:
      nodejs: 24
    commands:
      - echo "Installing pnpm..."
      - npm install -g pnpm@9
      - echo "Installing dependencies (including devDependencies)..."
      - NODE_ENV=development pnpm install --frozen-lockfile

  pre_build:
    commands:
      - echo "Pre-build phase - skipping checks (will run during build)"

  build:
    commands:
      - echo "Loading environment variables from SSM and Secrets Manager..."
      - echo "Loading PROJECT_NAME from SSM..."
      - export PROJECT_NAME=$(aws ssm get-parameter --name "/github/project-name" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export NODE_ENV=production
      - echo "Using PROJECT_NAME=${PROJECT_NAME}"
      - |
        if [ -z "$PROJECT_NAME" ]; then
          echo "❌ ERROR: PROJECT_NAME not found in SSM Parameter Store"
          echo "Please run: pnpm sync-secrets staging"
          exit 1
        fi
      - echo "Loading SSM parameters..."
      - export API_DOMAIN=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/api-domain" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export HOSTED_ZONE_ID=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/hosted-zone-id" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export HOSTED_ZONE_NAME=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/hosted-zone-name" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export IMAGES_BUCKET=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/images-bucket" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export IMAGES_BUCKET_PREFIX=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/images-bucket-prefix" --query 'Parameter.Value' --output text --region $AWS_REGION 2>/dev/null || echo "")
      - export IMAGES_CDN_URL=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/images-cdn-url" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export CORS_DOMAIN_PATTERNS=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/cors-domain-patterns" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export CORS_EXACT_ORIGINS=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/cors-exact-origins" --query 'Parameter.Value' --output text --region $AWS_REGION 2>/dev/null || echo "")
      - export CORS_PARENT_DOMAINS=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/cors-parent-domains" --query 'Parameter.Value' --output text --region $AWS_REGION 2>/dev/null || echo "")
      - export ENABLE_WAF=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/enable-waf" --query 'Parameter.Value' --output text --region $AWS_REGION 2>/dev/null || echo "false")
      - echo "WAF enabled for stage ${STAGE} is ${ENABLE_WAF}"
      # SecureString — feeds both the Lambda env var and the CloudFront X-Origin-Verify header at synth time
      - export ORIGIN_VERIFY_SECRET=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/origin-verify-secret" --with-decryption --query 'Parameter.Value' --output text --region $AWS_REGION 2>/dev/null || echo "")
      - |
        if [ -z "$ORIGIN_VERIFY_SECRET" ]; then
          echo "⚠️ ORIGIN_VERIFY_SECRET not set — CloudFront origin verification is DISABLED for this deploy (run pnpm sync-secrets ${STAGE} with ORIGIN_VERIFY_SECRET in .env.${STAGE})"
        else
          echo "✓ Origin verification enabled for this deploy"
        fi
      - export DISABLE_BLUE_GREEN=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/disable-blue-green" --query 'Parameter.Value' --output text --region $AWS_REGION 2>/dev/null || echo "false")
      - echo "Blue-green disabled for stage ${STAGE} is ${DISABLE_BLUE_GREEN}"
      - echo "Loading GitHub configuration..."
      - export GITHUB_OWNER=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/github-owner" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export GITHUB_REPO=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/github-repo" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - export GITHUB_BRANCH=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/github-branch" --query 'Parameter.Value' --output text --region $AWS_REGION)
      - echo "Loading Secrets Manager secrets..."
      - export WORKOS_CLIENT_ID=$(aws secretsmanager get-secret-value --secret-id "/${PROJECT_NAME}/${STAGE}/workos" --query 'SecretString' --output text --region $AWS_REGION | jq -r '.clientId')
      - export SENTRY_DSN=$(aws ssm get-parameter --name "/${PROJECT_NAME}/${STAGE}/sentry-dsn" --query 'Parameter.Value' --output text --region $AWS_REGION 2>/dev/null || echo "")
      - echo "✓ Loaded all environment variables for stage=$STAGE"
      # Critical vulns block the deploy; high-and-below only warn so an unrelated
      # overnight CVE can't block an urgent hotfix.
      - echo "Running dependency audit (critical = blocking, high = warning)..."
      - pnpm audit --audit-level=high || echo "⚠️ High-severity vulnerabilities found (non-blocking — review before next release)"
      - pnpm audit --audit-level=critical || { echo "❌ CRITICAL vulnerabilities found — failing the build"; exit 1; }
      - echo "Running lint..."
      - pnpm run lint
      - echo "Running typecheck..."
      - pnpm run typecheck
      - echo "Running unit tests..."
      - pnpm run test:run
      # Real-DB transaction integration tests. We spin up an ephemeral Postgres
      # inside the build container (NOT the deployed DB — these tests TRUNCATE
      # tables) so transaction commit/rollback is enforced before every deploy.
      - echo "Provisioning ephemeral Postgres for DB integration tests..."
      - apt-get update -qq && apt-get install -y -qq postgresql postgresql-contrib >/dev/null
      - service postgresql start
      - echo "Waiting for Postgres to accept connections..."
      - until su - postgres -c "pg_isready -q"; do sleep 1; done
      - su - postgres -c "psql -v ON_ERROR_STOP=1 -c \"ALTER USER postgres PASSWORD 'postgres';\""
      - su - postgres -c "psql -v ON_ERROR_STOP=1 -c \"CREATE DATABASE serverless_test;\""
      - echo "Running DB integration tests..."
      - TEST_DATABASE_URL="postgres://postgres:postgres@localhost:5432/serverless_test" pnpm run test:integration
      - echo "Building TypeScript..."
      - pnpm run build
      - echo "Deploying CDK stacks..."
      - pnpm run cdk deploy "${PROJECT_NAME}-${STAGE}-SecurityStack" "${PROJECT_NAME}-${STAGE}-DatabaseStack" "${PROJECT_NAME}-${STAGE}-MonitoringStack" "${PROJECT_NAME}-${STAGE}-CostMonitoringStack" "${PROJECT_NAME}-${STAGE}-CloudTrailStack" "${PROJECT_NAME}-${STAGE}-MediaStack" "${PROJECT_NAME}-${STAGE}-PublicAssetsStack" "${PROJECT_NAME}-${STAGE}-ApiStack" --require-approval never
      - echo "Running database migrations (after deploy for backward-compat)..."
      - pnpm run migrate

  post_build:
    commands:
      - echo "Deployment completed successfully!"
      - echo "Running smoke tests..."
      - |
        if [ "$STAGE" = "staging" ]; then
          API_URL="https://api-staging.${HOSTED_ZONE_NAME}"
        else
          API_URL="https://api.${HOSTED_ZONE_NAME}"
        fi
        echo "Testing health endpoint at $API_URL/v1/health/detailed"
        HEALTH_RESPONSE=$(curl -sf "$API_URL/v1/health/detailed") || (echo "❌ Smoke test failed — endpoint unreachable!" && exit 1)
        HEALTH_STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.data.status')
        if [ "$HEALTH_STATUS" = "unhealthy" ]; then
          echo "❌ Smoke test failed — health status: $HEALTH_STATUS"
          exit 1
        fi
        echo "✅ Smoke tests passed (status: $HEALTH_STATUS)"
