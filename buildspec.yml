version: 0.2

# AWS CodeBuild buildspec for CI/CD
# This file defines the build process for your serverless backend

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing pnpm..."
      - npm install -g pnpm@9
      - echo "Cleaning up any existing node_modules..."
      - rm -rf node_modules .pnpm-store
      - echo "Installing dependencies (including devDependencies)..."
      - NODE_ENV=development pnpm install --frozen-lockfile

  pre_build:
    commands:
      - echo "Pre-build phase - skipping checks (will run during build)"

  build:
    commands:
      - echo "Loading environment variables from SSM and Secrets Manager..."
      - export PROJECT_NAME=postway
      - export NODE_ENV=production
      - echo "Loading SSM parameters..."
      - export API_DOMAIN=$(aws ssm get-parameter --name "/postway/${STAGE}/api-domain" --query 'Parameter.Value' --output text --region us-east-1)
      - export HOSTED_ZONE_ID=$(aws ssm get-parameter --name "/postway/${STAGE}/hosted-zone-id" --query 'Parameter.Value' --output text --region us-east-1)
      - export HOSTED_ZONE_NAME=$(aws ssm get-parameter --name "/postway/${STAGE}/hosted-zone-name" --query 'Parameter.Value' --output text --region us-east-1)
      - export IMAGES_BUCKET=$(aws ssm get-parameter --name "/postway/${STAGE}/images-bucket" --query 'Parameter.Value' --output text --region us-east-1)
      - export IMAGES_BUCKET_PREFIX=$(aws ssm get-parameter --name "/postway/${STAGE}/images-bucket-prefix" --query 'Parameter.Value' --output text --region us-east-1 2>/dev/null || echo "postway-images-depot")
      - export IMAGES_CDN_URL=$(aws ssm get-parameter --name "/postway/${STAGE}/images-cdn-url" --query 'Parameter.Value' --output text --region us-east-1)
      - export CORS_DOMAIN_PATTERNS=$(aws ssm get-parameter --name "/postway/${STAGE}/cors-domain-patterns" --query 'Parameter.Value' --output text --region us-east-1)
      - export CORS_EXACT_ORIGINS=$(aws ssm get-parameter --name "/postway/${STAGE}/cors-exact-origins" --query 'Parameter.Value' --output text --region us-east-1 2>/dev/null || echo "")
      - export CORS_PARENT_DOMAINS=$(aws ssm get-parameter --name "/postway/${STAGE}/cors-parent-domains" --query 'Parameter.Value' --output text --region us-east-1 2>/dev/null || echo "")
      - echo "Loading Secrets Manager secrets..."
      - WORKOS_SECRET=$(aws secretsmanager get-secret-value --secret-id "/postway/${STAGE}/workos" --query 'SecretString' --output text --region us-east-1)
      - export WORKOS_CLIENT_ID=$(echo $WORKOS_SECRET | jq -r '.clientId')
      - DB_SECRET=$(aws secretsmanager get-secret-value --secret-id "/postway/${STAGE}/database" --query 'SecretString' --output text --region us-east-1)
      - export DATABASE_URL=$(echo $DB_SECRET | jq -r '.url')
      - echo "✓ Loaded all environment variables"
      - echo "  PROJECT_NAME=$PROJECT_NAME"
      - echo "  STAGE=$STAGE"
      - echo "  AWS_REGION=$AWS_REGION"
      - echo "  API_DOMAIN=$API_DOMAIN"
      - echo "  IMAGES_BUCKET=$IMAGES_BUCKET"
      - echo "  HOSTED_ZONE_NAME=$HOSTED_ZONE_NAME"
      - echo "Building TypeScript..."
      - pnpm run build
      - echo "Running database migrations..."
      - pnpm run migrate
      - echo "Deploying CDK stacks..."
      - pnpm run cdk deploy --all --require-approval never

  post_build:
    commands:
      - echo "Deployment completed successfully!"
      - echo "Running smoke tests..."
      - |
        if [ "$STAGE" = "staging" ]; then
          API_URL="https://api-staging.postway.services"
        else
          API_URL="https://api.postway.services"
        fi
      - echo "Testing health endpoint at $API_URL/v1/health/detailed"
      - curl -f "$API_URL/v1/health/detailed" || (echo "❌ Smoke test failed!" && exit 1)
      - echo "✅ Smoke tests passed!"
