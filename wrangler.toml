# wrangler.toml — Cloudflare Workers configuration (the replacement for the CDK stacks).
#
# Local dev:  npx wrangler dev --local         (no Cloudflare account needed;
#             R2/cron bindings are simulated on disk under .wrangler/state)
# Deploy:     npx wrangler deploy --env staging | --env production
# Secrets:    local  → .dev.vars (gitignored; template in .dev.vars.example)
#             remote → npx wrangler secret put <NAME> --env <staging|production>
#
# With nodejs_compat and a 2025+ compatibility_date, the runtime populates
# process.env from [vars] + secrets, so existing `process.env.X` reads in
# src/node keep working unchanged.

name = "replace-me-backend"
main = "src/node/worker.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Workers Logs (replaces CloudWatch log groups).
[observability]
enabled = true

# ─────────────────────────────────────────────────────────────────────────────
# Cron Triggers — the two daily maintenance jobs (UTC, off-peak):
#   "0 4 * * *" → src/node/handlers/utils/janitor.ts         (idempotency-key cleanup)
#   "0 5 * * *" → src/node/handlers/utils/audit-retention.ts (7-year audit-log pruning)
# These expressions are the DISPATCH KEYS: they must exactly match the keys of
# `cronRegistry` in src/node/cron.ts (see src/node/worker.ts `scheduled`).
# [triggers] IS inherited by [env.*] blocks, so it is declared once here.
# Test locally: wrangler dev --local --test-scheduled, then
#   curl "http://localhost:8787/__scheduled?cron=0+4+*+*+*"
# ─────────────────────────────────────────────────────────────────────────────
[triggers]
crons = [
  "0 4 * * *", # janitor — daily idempotency-key cleanup
  "0 5 * * *", # audit-retention — daily 7-year retention pruning
]

# ─────────────────────────────────────────────────────────────────────────────
# Non-secret config — mirrors the non-secret "Lambda Runtime Environment"
# section of docs/ENVIRONMENT_VARIABLES.md. SECRETS NEVER GO HERE (DATABASE_URL,
# WORKOS_CLIENT_ID, etc. → .dev.vars locally, `wrangler secret put` deployed).
# NOTE: [vars] and [[r2_buckets]] are NOT inherited by named environments —
# they are repeated in full under [env.staging] / [env.production] below.
# This top-level block is what `wrangler dev --local` uses.
# ─────────────────────────────────────────────────────────────────────────────
[vars]
NODE_ENV = "development"
STAGE = "local"
PROJECT_NAME = "replace-me"                   # PLACEHOLDER: project identifier
API_VERSION = "v1"
# CORS — same semantics as the Lambda env (see src/node/lib/cors.ts)
CORS_DOMAIN_PATTERNS = ""                       # PLACEHOLDER: regex patterns, comma-separated
CORS_EXACT_ORIGINS = "http://localhost:3000"    # PLACEHOLDER: exact origins, comma-separated
CORS_PARENT_DOMAINS = ""                        # PLACEHOLDER: parent domains, comma-separated
# Media — IMAGES_BUCKET must match [[r2_buckets]].bucket_name below; the CDN
# URL becomes the R2 public/custom-domain URL (was CloudFront).
IMAGES_BUCKET = "replace-me-images-local"
IMAGES_CDN_URL = "https://images-local.example.com"

# R2 — replaces the S3 images bucket. Route code reaches it as c.env.IMAGES
# (see src/node/worker.ts WorkerBindings). `wrangler dev --local` simulates the
# bucket on disk; the name does not need to exist on a real account.
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "replace-me-images-local"       # PLACEHOLDER: local-sim name, anything works

# ─────────────────────────────────────────────────────────────────────────────
# Cloudflare Queues — WorkOS webhook ingest/processing (replaces the webhook
# DLQ + alarm). The HTTP route (routes/webhooks.ts) verifies + enqueues onto
# WEBHOOK_QUEUE; `worker.queue` (src/node/queue.ts) consumes. The binding name
# is WEBHOOK_QUEUE in every environment. Local queues are SIMULATED on disk by
# `wrangler dev --local` (no Cloudflare account / no real queue needed); the
# route also falls back to inline processing when the binding is absent.
# ─────────────────────────────────────────────────────────────────────────────
[[queues.producers]]
queue = "replace-me-webhooks-local"
binding = "WEBHOOK_QUEUE"

[[queues.consumers]]
queue = "replace-me-webhooks-local"

# Per-IP rate limiting — Workers Rate Limiting binding (RATE_LIMITER; no
# dashboard resource needed). Top-level/local; repeated per env below.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"
simple = { limit = 100, period = 60 }


# ─────────────────────────────────────────────────────────────────────────────
# Staging
# Required secrets (set once): npx wrangler secret put DATABASE_URL --env staging
# (repeat for every secret listed in .dev.vars.example)
# ─────────────────────────────────────────────────────────────────────────────
[env.staging]

[env.staging.vars]
NODE_ENV = "staging"
STAGE = "staging"
PROJECT_NAME = "replace-me"                   # PLACEHOLDER: project identifier
API_VERSION = "v1"
SENTRY_ENVIRONMENT = "staging"
CORS_DOMAIN_PATTERNS = ""                       # PLACEHOLDER
CORS_EXACT_ORIGINS = "https://staging.example.com" # PLACEHOLDER: e.g. https://staging.yourdomain.com
CORS_PARENT_DOMAINS = ""                        # PLACEHOLDER
IMAGES_BUCKET = "replace-me-images-staging"   # PLACEHOLDER: must match the R2 bucket below
IMAGES_CDN_URL = "https://images-staging.example.com"

[[env.staging.r2_buckets]]
binding = "IMAGES"
bucket_name = "replace-me-images-staging"     # PLACEHOLDER: create with `wrangler r2 bucket create`

# Queues (staging) — create before the first staging deploy:
#   wrangler queues create <project>-webhooks-staging
#   wrangler queues create <project>-webhooks-dlq-staging
# Producer + main consumer (with DLQ routing), then a consumer that DRAINS the
# DLQ — both land in `handleQueueBatch`, which branches on `batch.queue`.
[[env.staging.queues.producers]]
queue = "replace-me-webhooks-staging"
binding = "WEBHOOK_QUEUE"

[[env.staging.queues.consumers]]
queue = "replace-me-webhooks-staging"
max_retries = 5
dead_letter_queue = "replace-me-webhooks-dlq-staging"

[[env.staging.queues.consumers]]
queue = "replace-me-webhooks-dlq-staging"

[[env.staging.ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1002"
simple = { limit = 100, period = 60 }

# ─────────────────────────────────────────────────────────────────────────────
# Production
# Required secrets (set once): npx wrangler secret put DATABASE_URL --env production
# (repeat for every secret listed in .dev.vars.example)
# ─────────────────────────────────────────────────────────────────────────────
[env.production]

[env.production.vars]
NODE_ENV = "production"
STAGE = "production"
PROJECT_NAME = "replace-me"                   # PLACEHOLDER: project identifier
API_VERSION = "v1"
SENTRY_ENVIRONMENT = "production"
CORS_DOMAIN_PATTERNS = ""                       # PLACEHOLDER
CORS_EXACT_ORIGINS = "https://example.com" # PLACEHOLDER: e.g. https://yourdomain.com
CORS_PARENT_DOMAINS = ""                        # PLACEHOLDER
IMAGES_BUCKET = "replace-me-images-production" # PLACEHOLDER: must match the R2 bucket below
IMAGES_CDN_URL = "https://images.example.com"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "replace-me-images-production"  # PLACEHOLDER: create with `wrangler r2 bucket create`

# Queues (production) — create before the first production deploy:
#   wrangler queues create <project>-webhooks-production
#   wrangler queues create <project>-webhooks-dlq-production
# Producer + main consumer (with DLQ routing), then a consumer that DRAINS the
# DLQ — both land in `handleQueueBatch`, which branches on `batch.queue`.
[[env.production.queues.producers]]
queue = "replace-me-webhooks-production"
binding = "WEBHOOK_QUEUE"

[[env.production.queues.consumers]]
queue = "replace-me-webhooks-production"
max_retries = 5
dead_letter_queue = "replace-me-webhooks-dlq-production"

[[env.production.queues.consumers]]
queue = "replace-me-webhooks-dlq-production"

[[env.production.ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1003"
simple = { limit = 100, period = 60 }
